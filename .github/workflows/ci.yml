# CI — the same bar a contributor runs locally: ./run_tests.sh
# (all suites + conformance + the personal-data gate). Matrix mirrors
# requires-python (>=3.10; tested floors 3.11).
name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      # The suite's real third-party surface is tiny by design; live-SDK
      # tests skip themselves when their extra isn't installed.
      - run: pip install pydantic prompt-toolkit keyring
      - run: PY=python ./run_tests.sh
