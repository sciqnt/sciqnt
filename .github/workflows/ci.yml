# CI for the repurposed sciqnt APP. The libraries + connectors graduated to their
# own sciqnt/sq-* repos, so the app's deps resolve from there (git-ref @v0.1.0 during
# the transition). CI installs the app — which pulls the whole component graph — then
# runs the app's own test suite. Matrix mirrors requires-python (>=3.10).
name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      # Installs sciqnt + every component lib from the sciqnt/sq-* repos (git-ref).
      - name: Install the app (pulls the component libs)
        run: pip install .
      - name: App test suite
        run: python -m unittest discover -s core/tests -p 'test_*.py'
