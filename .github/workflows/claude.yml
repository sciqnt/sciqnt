# On-demand agent — the FIX arm of the maintenance defense.
#
# A maintainer comments `@claude <instruction>` on a PR or issue (e.g.
# "@claude bring this in line with PRINCIPLES.md and push the fix", or
# "@claude this connector skips bitemporal columns — add them with a test").
# The agent reads the constitution + the code, makes the change, runs the
# suite, and pushes a commit to the PR branch (or opens one for an issue).
#
# SECURITY: the action only acts for users with write/admin permission, so an
# arbitrary fork contributor cannot trigger a push. This is the deliberate home
# for write access — gated behind a trusted human's explicit request — kept
# separate from the automated, read-only `principle-review` workflow.
# Note: pushing a fix onto a FORK's PR branch requires the contributor to have
# enabled "Allow edits from maintainers"; otherwise the agent proposes the
# patch in a comment instead.
name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Mint a token from the sciqnt-bot GitHub App so the agent's commits/PRs
      # come from a non-GITHUB_TOKEN actor and therefore TRIGGER CI + review
      # (git ops authored by the default GITHUB_TOKEN are loop-suppressed).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth (long-lived token from `claude setup-token`).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # sciqnt-bot App token (minted above) so a @claude fix PUSH triggers
          # CI + the synchronize re-review.
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: "@claude"
          # NO static `prompt:` here — in mention mode the triggering @claude
          # comment IS the task. (A `prompt:` would override it and run a generic
          # instruction instead.) Guardrails live in the system prompt below +
          # the repo CLAUDE.md (auto-read), so they apply to whatever's asked.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 40
            --append-system-prompt "The sciqnt constitution governs every edit (PRINCIPLES.md, .github/PRINCIPLE_REVIEW.md, AGENT_GUIDE.md). Any code you touch must keep ./run_tests.sh green (tests + conformance + personal-data scrub) — run it before you push. Money stays Decimal, facts stay bitemporal, no credential custody, synthetic fixtures only. State honest gaps (P18) in your summary."
