# sq-openfigi — unit manifest
name: sq-openfigi
kind: source                 # reference/identifier resolver
risk_tier: read
status: proof
flavours:                    # uniform schema (matches sq-degiro)
  api:
    risk: official           # free OpenFIGI mapping API
    dependencies: []         # stdlib only; independent of any price source
schema_version: 0
identifiers: [ISIN, FIGI, ticker, MIC]
capabilities:
  read:
    - resolve_isin           # ISIN -> all listings (figi/ticker/exchange)
    - yahoo_candidates       # ISIN -> ordered Yahoo tickers (pure, no pricing)
  execute: []
inputs:
  - ISIN
dependencies: []             # stdlib only; independent of any price source
caveats: many listings per ISIN; tickers may not match Yahoo exactly (resolve->validate); rate-limited without key
known_quirks: FINDINGS.md
license: MIT
