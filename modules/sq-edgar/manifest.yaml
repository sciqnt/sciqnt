# sq-edgar — unit manifest
name: sq-edgar
kind: source
risk_tier: read
status: proof
flavours:
  api:
    risk: official           # SEC's documented public JSON APIs
    dependencies: []         # stdlib only
schema_version: 0
capabilities:
  read:
    - resolve_cik            # ticker → CIK
    - recent_filings         # newest filings (8-K, Form 4, 10-K/Q, …)
    - fundamentals_lite      # latest-FY revenue / net income / EPS / assets / equity
  execute: []
inputs:
  - ticker                   # US-listed symbol
  - SQ_EDGAR_CONTACT         # your email (SEC fair-access UA requirement)
dependencies: []             # stdlib only
caveats: >
  US SEC registrants only. CONTEXT data — never an input to the money
  core. SEC requires an email-shaped contact in the User-Agent (403
  otherwise — live-verified); default is a placeholder, set your own.
  Rate limit 10 req/s; on-disk caching keeps usage single-digit.
