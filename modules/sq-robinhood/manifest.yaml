# sq-robinhood — unit manifest (machine-readable declarations)
name: sq-robinhood
kind: source                 # source | compute | action
risk_tier: read              # read-only; no execution
status: proof                # value path built + fixture-tested; pending real-credentials run
schema_version: 0
identifiers: [ticker]        # Robinhood gives symbol + instrument URL; no ISIN
broker: Robinhood
flavours:
  api:                       # LIVE — the only path Robinhood exposes
    risk: reverse-engineered # unofficial robin_stocks; against Robinhood ToS; at-your-own-risk
    needs_credentials: true  # local-only; macOS Keychain (setup_creds.py), .env fallback; MFA via pyotp
    dependencies: [robin_stocks, pyotp, keyring]
    code: src/sq_robinhood/live.py
    status: v1 — fixture-tested canonical adapter; pending a real-credentials run
  file-csv:                  # Robinhood has no clean CSV export contract — not built
    status: not-built
capabilities:
  read:
    - live_positions         # api (stocks + crypto)
    - live_cash              # api
  execute: []                # none — execution is a separate, higher trust tier (not implemented)
honest_gaps:
  - no_history               # no CSV; order-history reconstruction (get_all_*_orders) not wired
  - no_asof                  # follows from no_history — snapshot(asof=) raises
  - no_realized_pnl          # live path has no settlement events; realized_*_base = 0
known_quirks: FINDINGS.md
license: MIT
