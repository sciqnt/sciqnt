# sq-yahoo — unit manifest
name: sq-yahoo
kind: source
risk_tier: read
status: proof
flavours:                    # uniform schema (matches sq-degiro)
  api:
    risk: unofficial         # public Yahoo chart endpoint; ~15min delayed; can change without notice
    dependencies: []         # stdlib only
schema_version: 0
capabilities:
  read:
    - get_quote              # spot quote (fetch_quote; ~15min delayed)
    - get_fx                 # FX via the same endpoint (EURUSD=X, GBPEUR=X, …)
    - get_history            # fetch_chart: FULL daily series + dividend/split events + ccy meta, one request
    - get_close              # fetch_historical_close: close on/before a date (per-date fallback path)
    - price_provider         # YahooProvider implements sq_schema.PriceProvider (asof-aware, archive-wired)
  execute: []
inputs:
  - yahoo_ticker             # e.g. IB01.L, AAPL, ^GSPC, EURUSD=X
dependencies: []             # stdlib only
caveats: >
  Unofficial source, ~15min delayed; the endpoint has changed before and can
  again (self-heal trigger, not a contract). Chart series is SPLIT-ADJUSTED.
  LSE quotes arrive in pence ("GBp"/"GBX") — normalised to GBP at read time.
  Archive fallback serves the last local series when Yahoo breaks, bounded by
  a 7-day staleness grace past the last archived close (never serves a
  months-old close as current).
known_quirks: FINDINGS.md
license: MIT
