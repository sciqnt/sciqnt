[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "sciqnt-schema"
dynamic = ["version"]                # single source: sq_schema.__version__
description = "sq-schema — canonical cross-asset schema for sciqnt"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    # Bounded: the committed contract.schema.json is generated by pydantic's
    # JSON-Schema serializer, whose exact output ($defs shape, anyOf ordering)
    # can shift across MAJOR versions — the drift gate (test_contract_schema)
    # needs a stable generator. <3 keeps the golden reproducible for everyone
    # who pins this contract; regenerate the golden on a pydantic major bump.
    "pydantic>=2.5,<3",
]

[tool.setuptools]
packages = ["sq_schema"]

[tool.setuptools.dynamic]
version = { attr = "sq_schema.__version__" }

[tool.setuptools.package-dir]
sq_schema = "."

[tool.setuptools.package-data]
sq_schema = ["contract.schema.json"]   # ship the language-agnostic contract artifact
